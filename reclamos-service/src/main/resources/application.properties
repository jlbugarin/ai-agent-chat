# ============================================================
#  Aplicacion
# ============================================================
quarkus.application.name=reclamos-service
quarkus.http.port=8081

# ============================================================
#  Base de datos H2 (local, en archivo)
# ============================================================
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/reclamosdb;AUTO_SERVER=TRUE

# ============================================================
#  Hibernate ORM
# ============================================================
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# ============================================================
#  OpenAPI / Swagger UI
#  - Spec:      http://localhost:8081/q/openapi   (JSON)
#               http://localhost:8081/q/openapi?format=yaml
#  - Swagger:   http://localhost:8081/q/swagger-ui
#  always-include=true habilita Swagger UI tambien en perfil prod
#  (por defecto solo se expone en dev).
# ============================================================
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.title=Reclamos Service API

quarkus.smallrye-openapi.info-title=Reclamos Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API REST para registrar y consultar reclamos bancarios. La misma logica de negocio esta tambien expuesta como capa MCP Server en /mcp/sse y consumida por el chat web (reclamos-chat) via LangChain4j.
quarkus.smallrye-openapi.info-contact-name=Buga Banca Digital
quarkus.smallrye-openapi.info-contact-email=soporte@buga.example
quarkus.smallrye-openapi.info-license-name=Propietario

# ============================================================
#  Capa MCP Server
# ============================================================
quarkus.mcp.server.server-info.name=reclamos-mcp-server
quarkus.mcp.server.server-info.version=1.0.0

# ============================================================
#  Logging
# ============================================================
quarkus.log.console.enable=true
quarkus.log.level=INFO
quarkus.log.category."com.banco.reclamos".level=DEBUG

# ============================================================
#  Perfil "stdio" (Claude Desktop)
# ============================================================
%stdio.quarkus.log.console.enable=false
%stdio.quarkus.log.file.enable=true
%stdio.quarkus.log.file.path=reclamos-mcp.log
%stdio.quarkus.log.file.level=INFO
%stdio.quarkus.log.category."com.banco.reclamos".level=DEBUG
