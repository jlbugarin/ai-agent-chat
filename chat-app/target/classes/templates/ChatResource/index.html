<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat MCP - Consultor Java</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f7;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
        .chat-container {
            width: 100%;
            max-width: 760px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
        }
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid #ececec;
        }
        .chat-header h1 { margin: 0; font-size: 18px; font-weight: 500; }
        .chat-header p { margin: 4px 0 0; font-size: 13px; color: #666; }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .msg {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .msg-user {
            align-self: flex-end;
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-assistant {
            align-self: flex-start;
            background: #f0f0f3;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }
        .empty-state {
            margin: auto;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        .chat-input {
            display: flex;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid #ececec;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d4d4d8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        .chat-input input:focus { border-color: #2563eb; }
        .chat-input button {
            padding: 12px 22px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .chat-input button:hover { background: #1d4ed8; }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        .htmx-indicator {
            display: none;
            align-self: flex-start;
            color: #888;
            font-style: italic;
            font-size: 14px;
            padding: 4px 12px;
        }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request.htmx-indicator { display: block; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Chat con MCP</h1>
            <p>LLM local (Podman AI Lab) · herramientas vía servidor MCP en Quarkus</p>
        </div>

        <div id="chat-messages">
            <div class="empty-state">
                Pregúntame por el clima de una ciudad, un repositorio de GitHub o un issue de Jira.
            </div>
            <div id="loader" class="htmx-indicator">El asistente está pensando…</div>
        </div>

        <form class="chat-input"
              hx-post="/chat"
              hx-target="#loader"
              hx-swap="beforebegin"
              hx-indicator="#loader"
              hx-on::before-request="document.querySelector('.empty-state')?.remove()"
              hx-on::after-request="this.reset(); document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight">
            <input type="text"
                   name="message"
                   placeholder="Escribe tu mensaje…"
                   autocomplete="off"
                   autofocus
                   required>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
