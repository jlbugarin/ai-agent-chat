# ----------------------------------------------------------------------------
# CONFIGURACIÓN DEL LLM LOCAL (Podman AI Lab)
# ----------------------------------------------------------------------------
# Podman AI Lab expone una API compatible con OpenAI cuando levantas un "Model
# Service" desde su UI. La URL y el puerto los ves al crear el servicio.
# Reemplaza la URL de abajo con la que aparece en tu instancia de Podman AI Lab.

quarkus.langchain4j.openai.base-url=http://localhost:35353/v1
# La API key es obligatoria por el cliente OpenAI pero Podman AI Lab la ignora.
quarkus.langchain4j.openai.api-key=podman-ai-lab-no-key
# Nombre del modelo que cargaste en Podman AI Lab (ej: instructlab/granite-7b-lab-GGUF)
# Asegúrate de elegir un modelo que soporte function/tool calling.
quarkus.langchain4j.openai.chat-model.model-name=instructlab/granite-7b-lab-GGUF
quarkus.langchain4j.openai.chat-model.temperature=0.3
# Los LLMs locales son lentos: subimos timeouts.
quarkus.langchain4j.openai.timeout=120s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DEL CLIENTE MCP
# ----------------------------------------------------------------------------
# 'external-apis' es el nombre lógico que referenciamos en @McpToolBox
quarkus.langchain4j.mcp.external-apis.transport-type=http
quarkus.langchain4j.mcp.external-apis.url=http://localhost:8081/mcp/sse

# ----------------------------------------------------------------------------
# WEB
# ----------------------------------------------------------------------------
quarkus.http.port=8080
