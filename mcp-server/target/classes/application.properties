# Servidor MCP corre en puerto 8081 para no chocar con el chat app (8080)
quarkus.http.port=8081

# Endpoints REST clients para APIs externas
# Open-Meteo: clima y geocoding (sin API key)
quarkus.rest-client.geocoding-api.url=https://geocoding-api.open-meteo.com
quarkus.rest-client.weather-api.url=https://api.open-meteo.com

# GitHub: información pública de repositorios (sin auth para uso básico)
quarkus.rest-client.github-api.url=https://api.github.com

# Logging útil para ver las invocaciones MCP en desarrollo
quarkus.log.category."io.quarkiverse.mcp".level=DEBUG
