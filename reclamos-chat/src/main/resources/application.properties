# =============================================================================
# reclamos-chat — cliente de chat web + LLM + MCP client (JVM separado)
# =============================================================================

quarkus.application.name=reclamos-chat
quarkus.http.port=8080

# CORS abierto solo para desarrollo local. En PROD restringir a dominios del banco.
quarkus.http.cors=true
quarkus.http.cors.origins=*

# -----------------------------------------------------------------------------
# Proveedor LLM (OpenAI)
# Exporta la API key antes de levantar:  $env:OPENAI_API_KEY = "sk-..."
# -----------------------------------------------------------------------------
#quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:not-set}
#quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
#quarkus.langchain4j.openai.chat-model.temperature=0.2
#quarkus.langchain4j.openai.timeout=60s
#*****************
quarkus.langchain4j.openai.base-url=http://localhost:60423/v1
# La API key es obligatoria por el cliente OpenAI pero Podman AI Lab la ignora.
quarkus.langchain4j.openai.api-key=podman-ai-lab-no-key
# Nombre del modelo que cargaste en Podman AI Lab (ej: instructlab/granite-7b-lab-GGUF)
# Asegúrate de elegir un modelo que soporte function/tool calling.
quarkus.langchain4j.openai.chat-model.model-name=ibm-granite/granite-4.0-micro-GGUF
quarkus.langchain4j.openai.chat-model.temperature=0.3
# Los LLMs locales son lentos: subimos timeouts.
quarkus.langchain4j.openai.timeout=320s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# Logging detallado del LLM (apagar en PROD)


# -----------------------------------------------------------------------------
# Cliente MCP "reclamos" — apunta al reclamos-service en la OTRA JVM (puerto 8081)
# Como están separados NO hay arranque circular; dejamos health-check activado.
# -----------------------------------------------------------------------------
quarkus.langchain4j.mcp.reclamos.transport-type=http
quarkus.langchain4j.mcp.reclamos.url=http://localhost:8081/mcp/sse
quarkus.langchain4j.mcp.reclamos.log-requests=true
quarkus.langchain4j.mcp.reclamos.log-responses=true
quarkus.langchain4j.mcp.reclamos.health-check-enabled=true

# -----------------------------------------------------------------------------
# Memoria conversacional: ventana de 20 mensajes por sessionId
# -----------------------------------------------------------------------------
quarkus.langchain4j.chat-memory.memory-window.max-messages=20

# -----------------------------------------------------------------------------
# Logs de extensiones LangChain4j (útil para depurar la negociación MCP)
# -----------------------------------------------------------------------------
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG
quarkus.log.category."dev.langchain4j".level=INFO
